{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center">
                <i class="bi bi-exclamation-triangle display-3 text-naranja"></i>
                <h3 class="mt-3">¿Eliminar "{{ producto.nombre }}"?</h3>
                <p class="text-muted">Esta acción no se puede deshacer.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-peligro">
                            <i class="bi bi-trash"></i> Eliminar
                        </button>
                        <a href="{% url 'gestionar_productos' %}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
